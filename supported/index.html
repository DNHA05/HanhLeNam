<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARBLX API | Supported</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glow-text { text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
        .service-card {
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            transition: all 0.3s ease;
        }
        .service-card:hover { border-color: #6366f1; transform: scale(1.02); }
        .error-container { background: rgba(255, 0, 0, 0.03); border: 1px solid rgba(255, 50, 50, 0.15); border-radius: 24px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 flex justify-between items-center max-w-5xl mx-auto w-full">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-[#4f46e5] rounded-xl flex items-center justify-center font-bold text-xl shadow-[0_0_20px_rgba(79,70,229,0.4)]">H</div>
            <span class="text-xl font-bold tracking-tight uppercase">Harblx <span class="text-gray-500">API</span></span>
        </div>
        <button class="text-[11px] font-bold py-2 px-6 border border-white/10 rounded-full bg-black/40 uppercase tracking-widest">Discord</button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center px-6 pb-20">
        <div class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-black italic mb-6 tracking-tighter glow-text uppercase">SUPPORTED</h1>
            <p class="text-gray-500 max-w-sm mx-auto text-sm leading-relaxed">Danh sách các dịch vụ đang được hỗ trợ bởi hệ thống Harblx Online.</p>
        </div>

        <div id="content-area" class="w-full max-w-xl">
            <div id="loader" class="text-center py-20">
                <div class="inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-gray-600 text-xs mt-4 uppercase tracking-widest">Đang kết nối API...</p>
            </div>

            <div id="services-grid" class="grid grid-cols-2 gap-4 hidden"></div>

            <div id="error-box" class="error-container p-10 text-center hidden">
                <div class="text-yellow-500 text-3xl mb-4">⚠️</div>
                <h3 class="text-red-500 font-bold text-lg mb-2">Lỗi kết nối API!</h3>
                <p id="error-detail" class="text-gray-500 text-sm">Vui lòng kiểm tra lại CORS hoặc Server.</p>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center">
        <p class="text-[10px] text-gray-700 tracking-[4px] uppercase font-medium">ENDPOINT: API.HARBLX.ONLINE:31329</p>
    </footer>

    <script>
        // Sử dụng AllOrigins để vượt lỗi CORS
        const TARGET_API = 'http://api.harblx.online:31329/v1/supported';
        const PROXY_URL = `https://api.allorigins.win/get?url=${encodeURIComponent(TARGET_API)}`;

        async function fetchAPI() {
            const grid = document.getElementById('services-grid');
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('error-box');

            try {
                const response = await fetch(PROXY_URL);
                if (!response.ok) throw new Error('Proxy error');
                
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents); // Parse dữ liệu gốc từ Proxy
                
                // Lấy danh sách dịch vụ (tùy vào cấu trúc JSON của bạn)
                const services = data.supported || data;

                loader.classList.add('hidden');
                grid.classList.remove('hidden');
                
                grid.innerHTML = services.map(name => `
                    <div class="service-card p-5 text-center shadow-lg">
                        <span class="font-bold text-gray-300 text-xs uppercase tracking-widest">${name}</span>
                    </div>
                `).join('');

            } catch (err) {
                loader.classList.add('hidden');
                errorBox.classList.remove('hidden');
                console.error("Lỗi:", err);
            }
        }

        window.onload = fetchAPI;
    </script>
</body>
</html>
